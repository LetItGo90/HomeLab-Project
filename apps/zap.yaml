apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zap
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/LetItGo90/HomeLab-Project.git
    targetRevision: main
    path: infrastructure/zap
  destination:
    server: https://kubernetes.default.svc
    namespace: zap-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true