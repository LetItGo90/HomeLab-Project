apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/headlamp/
    chart: headlamp
    targetRevision: "0.42.0"
    helm:
      valuesObject:
        config:
          pluginsDir: /build/plugins
        initContainers:
          - name: kubescape-plugin
            image: quay.io/kubescape/headlamp-plugin:v0.11.2
            command:
              - /bin/sh
              - '-c'
              - mkdir -p /build/plugins && cp -r /plugins/* /build/plugins/
            volumeMounts:
              - mountPath: /build/plugins
                name: headlamp-plugins
          - name: trivy-plugin
            image: ghcr.io/kubebeam/trivy-headlamp-plugin:v0.3.2
            command:
              - /bin/sh
              - '-c'
              - mkdir -p /build/plugins && cp -r /plugins/* /build/plugins/
            volumeMounts:
              - mountPath: /build/plugins
                name: headlamp-plugins
        volumeMounts:
          - name: headlamp-plugins
            mountPath: /build/plugins
        volumes:
          - name: headlamp-plugins
            emptyDir: {}
        ingress:
          enabled: true
          ingressClassName: cilium
          annotations:
            cert-manager.io/cluster-issuer: vault-issuer
            cert-manager.io/common-name: headlamp.homelab.local
          hosts:
            - host: headlamp.homelab.local
              paths:
                - path: /
                  type: Prefix
          tls:
            - secretName: headlamp-tls
              hosts:
                - headlamp.homelab.local
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true