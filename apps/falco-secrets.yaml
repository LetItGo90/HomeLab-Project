apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco-secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/LetItGo90/HomeLab-Project.git
    targetRevision: main
    path: apps/falco-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: falco
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true