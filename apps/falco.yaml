apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: 4.21.2
    helm:
      valuesObject:
        driver:
          kind: modern_ebpf

        collectors:
          enabled: true

        falcosidekick:
          config:
            splunk:
              host: "https://splunk-splunk-standalone-service.splunk.svc.cluster.local:8088"
              checkcert: false
          extraEnv:
            - name: FALCOSIDEKICK_CONFIG_SPLUNK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: falcosidekick-splunk
                  key: splunk-token
          enabled: true
          serviceMonitor:
            enabled: true
            additionalLabels:
              release: kube-prometheus-stack
          replicaCount: 1
          prometheusRules:
            enabled: true
          webui:
            enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: falco
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true
      - ServerSideApply=true