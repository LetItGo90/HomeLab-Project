name: Detection Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'detection/rules/**.yml'
      - 'detection/rules/**.yaml'

jobs:
  deploy:
    runs-on: self-hosted
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate savedsearches.conf
        run: |
          echo "=== Files in rules dir ==="
          ls -la detection/rules/falco/
          echo "=== Sigma output ==="
          sigma convert \
            --target splunk \
            --pipeline detection/pipelines/falco-splunk.yaml \
            --format savedsearches \
            detection/rules/falco/ > /tmp/savedsearches.conf 2>/tmp/sigma-errors.txt
          echo "=== Sigma errors ==="
          cat /tmp/sigma-errors.txt
          echo "=== savedsearches.conf ==="
          cat /tmp/savedsearches.conf

      - name: Deploy to Splunk pod
        env:
          SPLUNK_PASSWORD: ${{ secrets.SPLUNK_PASSWORD }}
        run: |
          kubectl cp /tmp/savedsearches.conf \
            splunk/splunk-splunk-standalone-0:/opt/splunk/etc/apps/search/local/savedsearches.conf
          kubectl exec -n splunk splunk-splunk-standalone-0 -- \
            /opt/splunk/bin/splunk _internal call /services/configs/conf-savedsearches/_reload -auth admin:${SPLUNK_PASSWORD}