name: Detection Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'detection/rules/**.yml'
      - 'detection/rules/**.yaml'
      - 'detection/pipelines/**.yaml'

jobs:
  deploy:
    runs-on: self-hosted
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate savedsearches.conf
        run: |
          set -euo pipefail

          echo "=== Pipeline content ==="
          cat detection/pipelines/falco-splunk.yaml

          echo "=== Line ending check ==="
          file detection/rules/falco/*.yaml
          file detection/pipelines/falco-splunk.yaml

          echo "=== Single file test (no pipeline) ==="
          sigma convert \
            --target splunk \
            --without-pipeline \
            --format savedsearches \
            detection/rules/falco/falco_shadow_read.yaml

          echo "=== Single file test (with pipeline) ==="
          sigma convert \
            --target splunk \
            --pipeline detection/pipelines/falco-splunk.yaml \
            --format savedsearches \
            detection/rules/falco/falco_shadow_read.yaml

          echo "=== Full directory convert ==="
          sigma convert \
            --target splunk \
            --pipeline detection/pipelines/falco-splunk.yaml \
            --format savedsearches \
            detection/rules/falco/ \
            2>/tmp/sigma-errors.txt | tee /tmp/savedsearches.conf

          echo "=== Real sigma errors (CRLF stripped) ==="
          tr '\r' '\n' < /tmp/sigma-errors.txt | grep -v '^$'

          echo "=== savedsearches.conf ==="
          cat /tmp/savedsearches.conf

      - name: Deploy to Splunk pod
        env:
          SPLUNK_PASSWORD: ${{ secrets.SPLUNK_PASSWORD }}
        run: |
          set -euo pipefail
          kubectl cp /tmp/savedsearches.conf \
            splunk/splunk-splunk-standalone-0:/opt/splunk/etc/apps/search/local/savedsearches.conf
          kubectl exec -n splunk splunk-splunk-standalone-0 -- \
            curl -sk -u admin:${SPLUNK_PASSWORD} \
            -X POST \
            https://localhost:8089/services/configs/conf-savedsearches/_reload