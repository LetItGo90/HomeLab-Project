# infrastructure/vault/vault-unsealer/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-unsealer
  namespace: vault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault-unsealer
  template:
    metadata:
      labels:
        app: vault-unsealer
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 100  # vault user in the hashicorp/vault image
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: unsealer
        image: hashicorp/vault:1.21.2
        command:
        - /bin/sh
        - -c
        - |
          while true; do
            vault status 2>/dev/null
            if [ $? -eq 2 ]; then
              echo "Vault is sealed, unsealing..."
              vault operator unseal $KEY1
            fi
            sleep 30
          done
        env:
        - name: VAULT_ADDR
          value: http://vault.vault.svc.cluster.local:8200
        - name: KEY1
          valueFrom:
            secretKeyRef:
              name: vault-unseal-keys
              key: key1
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 100
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}