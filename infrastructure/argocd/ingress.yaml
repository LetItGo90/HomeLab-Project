apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-tls
  namespace: argocd
spec:
  secretName: argocd-tls
  commonName: argocd.homelab.local
  issuerRef:
    name: vault-issuer
    kind: ClusterIssuer
  dnsNames:
    - argocd.homelab.local
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
spec:
  ingressClassName: cilium
  tls:
    - hosts:
        - argocd.homelab.local
      secretName: argocd-tls
  rules:
    - host: argocd.homelab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80