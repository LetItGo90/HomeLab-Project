apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmp-cm
  namespace: argocd
data:
  avp.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: ConfigManagementPlugin
    metadata:
      name: argocd-vault-plugin
    spec:
      allowConcurrency: true
      discover:
        find:
          command:
            - sh
            - "-c"
            - "find . -name '*.yaml' | xargs -I {} grep -l '<path:\\|avp\\.kubernetes\\.io' {} 2>/dev/null"
      generate:
        command:
          - argocd-vault-plugin
          - generate
          - "."
      lockRepo: false
  avp-helm.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: ConfigManagementPlugin
    metadata:
      name: argocd-vault-plugin-helm
    spec:
      allowConcurrency: true
      discover:
        find:
          command:
            - sh
            - "-c"
            - "find . -name 'Chart.yaml' 2>/dev/null"
      generate:
        command:
          - bash                          # <-- was sh
          - "-c"
          - |
            helm template $ARGOCD_APP_NAME $ARGOCD_ENV_HELM_CHART \
              --repo $ARGOCD_ENV_HELM_REPO \
              --version $ARGOCD_ENV_HELM_VERSION \
              -f <(echo "$ARGOCD_ENV_HELM_VALUES") | \
              argocd-vault-plugin generate -
      lockRepo: false
