      url: "https://argocd.homelab.local"
      oidc.config: |
        name: Keycloak
        issuer: https://keycloak.homelab.local/realms/homelab
        clientID: argocd
        clientSecret: $oidc.keycloak.clientSecret
        requestedScopes:
          - openid
          - profile
          - email
          - groups
