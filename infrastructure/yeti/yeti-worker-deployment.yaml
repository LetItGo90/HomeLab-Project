apiVersion: apps/v1
kind: Deployment
metadata:
  name: yeti-worker
  namespace: yeti
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yeti-worker
  template:
    metadata:
      labels:
        app: yeti-worker
    spec:
      containers:
        - name: yeti-worker
          image: yetiplatform/yeti:latest
          args: ["tasks"]
          envFrom:
            - configMapRef:
                name: yeti-config
          env:
            - name: YETI_ARANGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: yeti-secrets
                  key: arangodb-root-password
            - name: YETI_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: yeti-secrets
                  key: yeti-auth-secret
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yeti-beat
  namespace: yeti
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yeti-beat
  template:
    metadata:
      labels:
        app: yeti-beat
    spec:
      containers:
        - name: yeti-beat
          image: yetiplatform/yeti:latest
          args: ["tasks-beat"]
          envFrom:
            - configMapRef:
                name: yeti-config
          env:
            - name: YETI_ARANGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: yeti-secrets
                  key: arangodb-root-password
            - name: YETI_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: yeti-secrets
                  key: yeti-auth-secret
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 200m