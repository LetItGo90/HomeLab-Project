apiVersion: apps/v1
kind: Deployment
metadata:
  name: yeti-api
  namespace: yeti
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yeti-api
  template:
    metadata:
      labels:
        app: yeti-api
    spec:
      initContainers:
        - name: wait-for-arangodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://arangodb.yeti.svc.cluster.local:8529/_admin/server/availability > /dev/null 2>&1; do
                echo "Waiting for ArangoDB..."
                sleep 5
              done
              echo "ArangoDB ready."
      containers:
        - name: yeti-api
          image: yetiplatform/yeti:latest
          args: ["webserver"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: yeti-config
          env:
            - name: YETI_ARANGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: yeti-secrets
                  key: arangodb-root-password
            - name: YETI_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: yeti-secrets
                  key: yeti-auth-secret
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: yeti-api
  namespace: yeti
spec:
  selector:
    app: yeti-api
  ports:
    - port: 8000
      targetPort: 8000