---
title: Suspicious Kubectl Exec - Terminal Shell in Container
id: b2c3d4e5-f6a7-8901-bcde-f12345678901
status: experimental
description: Detects an interactive terminal shell spawned inside a container
author: you
date: 2025-01-01
tags:
  - attack.execution
  - attack.t1609
logsource:
  product: linux
  service: syslog
detection:
  selection:
    output_fields.proc.name|contains:
      - "bash"
      - "sh"
      - "zsh"
    output_fields.proc.tty|gt: 0
  filter:
    output_fields.container.id: "host"
  condition: selection and not filter
level: medium
#test7
