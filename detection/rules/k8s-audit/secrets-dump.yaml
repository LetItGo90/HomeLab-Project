title: Kubernetes Cluster-Wide Secrets Dump
id: b2c3d4e5-f6a7-8901-bcde-f12345678901
status: experimental
description: Detects a cluster-wide dump of Kubernetes secrets via LIST /api/v1/secrets, characteristic of credential access attacks.
author: Austin Mundy
date: 2026-06-18
tags:
  - attack.credential_access
  - attack.t1552.007
logsource:
  product: k8s
  service: audit
detection:
  selection:
    verb: list
    objectRef.resource: secrets
    annotations.authorization.k8s.io/decision: allow
  filter_namespaced:
    requestURI|contains: namespaces
  filter_known_sa:
    user.username|startswith:
      - 'system:serviceaccount:'
      - 'system:kube'
      - 'system:k3s'
  condition: selection and not filter_namespaced and not filter_known_sa
falsepositives:
  - Legitimate cluster administrators auditing secrets
level: high