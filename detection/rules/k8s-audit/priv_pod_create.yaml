title: Privileged Pod Creation
id: b2c3d4e5-f6a7-8901-bcde-f12345678901
status: experimental
description: Detects creation of a privileged pod via the Kubernetes API
author: austin mundy
date: 2025-01-01
tags:
  - attack.privilege_escalation
  - attack.t1611
logsource:
  product: k8s
  service: audit
detection:
  selection:
    objectRef.resource: "pods"
    verb: "create"
    requestObject.spec.containers[*].securityContext.privileged: true
  condition: selection
level: high